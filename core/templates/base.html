<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Emmanuel Katalay</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#a855f7',
                        darkbg: '#0a0a0f',
                        card: '#111118'
                    },
                    boxShadow: {
                        glow: '0 0 25px rgba(168,85,247,0.35)'
                    }
                }
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body class="font-['Inter'] bg-white text-black dark:bg-darkbg dark:text-white transition-colors duration-300">

    <!-- Loader -->
    <div id="loader" class="fixed inset-0 bg-black flex items-center justify-center z-50">
        <div class="flex flex-col items-center gap-4">
            <div class="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
            <p class="text-sm text-gray-400">Chargement...</p>
        </div>
    </div>

    <!-- Background glow -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-primary/20 blur-3xl rounded-full"></div>
    </div>

    <!-- Navbar -->
    <nav class="px-6 md:px-16 py-6 flex justify-between items-center">
        <a href="/" class="text-lg font-extrabold tracking-widest">HARDEN.DEV</a>

        <div class="hidden md:flex items-center gap-8 text-sm text-gray-600 dark:text-gray-300">
               
            <a href="{% url 'home' %}#about" class="hover:text-primary transition">About</a>
            <a href="{% url 'home' %}#skills" class="hover:text-primary transition">Skills</a>
            <a href="{% url 'home' %}#services" class="hover:text-primary transition">Services</a>
            <a href="{% url 'home' %}#projects" class="hover:text-primary transition">Projects</a>
            <a href="{% url 'home' %}#contact" class="hover:text-primary transition">Contact</a>
            <a href="/dashboard/" class="hover:text-primary">Dashboard</a>

        </div>

        <div class="flex items-center gap-3">
            <button onclick="toggleTheme()" class="px-4 py-2 rounded-full border border-gray-300 dark:border-gray-700 hover:border-primary transition">
                🌙
            </button>
            <a href="#contact" class="hidden md:inline-block bg-primary text-white px-5 py-2 rounded-full shadow-glow hover:scale-105 transition">
                Me contacter
            </a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script>
        window.addEventListener("load", () => {
            gsap.to("#loader", {
                opacity: 0,
                duration: 0.6,
                onComplete: () => {
                    document.getElementById("loader").style.display = "none";
                }
            });

            gsap.from("main", {
                opacity: 0,
                y: 30,
                duration: 1,
                ease: "power3.out"
            });
        });

        document.querySelectorAll("a[href]").forEach(link => {
            link.addEventListener("click", function(e) {
                const href = this.getAttribute("href");
                if (href && href.startsWith("/") && this.hostname === window.location.hostname) {
                    e.preventDefault();
                    const url = this.href;
                    gsap.to("main", {
                        opacity: 0,
                        y: -20,
                        duration: 0.4,
                        onComplete: () => window.location.href = url
                    });
                }
            });
        });

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle("dark");
            localStorage.setItem("theme", html.classList.contains("dark") ? "dark" : "light");
        }

        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>

</body>
</html>
